<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声入力 → VS Code</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #1a1a1e;
    --border: #2a2a30;
    --accent: #00e5a0;
    --accent-dim: rgba(0, 229, 160, 0.15);
    --text: #e8e8ec;
    --text-muted: #6b6b7a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .textarea-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .textarea-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  textarea {
    width: 100%;
    min-height: 260px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    padding: 20px;
    resize: vertical;
  }

  textarea::placeholder {
    color: var(--text-muted);
    font-size: 14px;
  }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-send {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    padding: 13px 24px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-send:hover { opacity: 0.88; }
  .btn-send:active { transform: scale(0.98); }

  .btn-clear {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 13px 18px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-clear:hover {
    color: var(--text);
    border-color: var(--text-muted);
  }

  .shortcut-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Voice → VS Code</h1>
    <span class="subtitle">音声入力してCtrl+Shift+Vで転送</span>
  </header>

  <div class="status-bar">
    <div class="dot"></div>
    <span>待機中 — Spokenlyで音声入力してください</span>
  </div>

  <div class="textarea-wrap">
    <textarea id="inputArea" placeholder="ここをクリックしてから、Spokenlyで音声入力してください。&#10;&#10;入力が終わったら Ctrl+Shift+V でVS Codeに転送されます。"></textarea>
    <span class="char-count" id="charCount">0</span>
  </div>

  <div class="actions">
    <button class="btn-send" onclick="sendToVSCode()">VS Codeに転送　→</button>
    <button class="btn-clear" onclick="clearInput()">クリア</button>
  </div>

  <div class="shortcut-hint">
    <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>V</kbd> でも転送できます
  </div>
</div>

<div class="toast" id="toast">転送しました</div>

<script>
  const textarea = document.getElementById('inputArea');
  const charCount = document.getElementById('charCount');
  const toast = document.getElementById('toast');

  textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length;
  });

  function sendToVSCode() {
    if (!textarea.value.trim()) return;
    textarea.select();
    document.execCommand('copy');
    showToast('クリップボードにコピーしました — AutoHotkeyが転送します');
  }

  function clearInput() {
    textarea.value = '';
    charCount.textContent = '0';
    textarea.focus();
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Ctrl+Shift+V
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'V') {
      e.preventDefault();
      sendToVSCode();
    }
  });

  // フォーカス
  textarea.focus();
</script>

</body>
</html>
